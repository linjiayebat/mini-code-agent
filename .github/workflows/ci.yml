name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.25"
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run --no-sync ruff format --check .
      - run: uv run --no-sync ruff check .
      - run: uv run --no-sync pyright
      - run: uv build --build-constraint build-constraints.txt --require-hashes
      - run: uv run --python 3.13 --isolated --no-project --with dist/*.whl tests/smoke_test.py
      - run: uv run --python 3.13 --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py

  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.25"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run --no-sync pytest --cov
